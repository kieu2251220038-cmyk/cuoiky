<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoneyTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <main class="container">
    <header class="hero">
      <h1>MoneyTracker</h1>
      <p>Quan ly chi tieu ca nhan voi thong ke va tim kiem nhanh.</p>
    </header>

    <section class="card auth-grid">
      <div>
        <h2>Dang ky</h2>
        <form id="register-form">
          <input name="username" placeholder="Username" required />
          <input name="email" placeholder="Email" type="email" />
          <input name="password" placeholder="Password" type="password" required />
          <button type="submit">Tao tai khoan</button>
        </form>
      </div>

      <div>
        <h2>Dang nhap</h2>
        <form id="login-form">
          <input name="username" placeholder="Username" required />
          <input name="password" placeholder="Password" type="password" required />
          <button type="submit">Dang nhap</button>
        </form>
      </div>
    </section>

    <section class="card" id="app-section">
      <div class="toolbar">
        <h2>Quan ly chi tieu</h2>
        <button id="logout-btn" class="btn-secondary">Dang xuat</button>
      </div>

      <form id="expense-form" class="expense-form">
        <input type="hidden" name="id" />
        <input name="title" placeholder="Ten khoan chi" required />
        <input name="category" placeholder="Loai (Food, Travel...)" required />
        <input name="amount" placeholder="So tien" type="number" min="1" step="0.01" required />
        <input name="spent_at" type="date" required />
        <input name="note" placeholder="Ghi chu" />
        <button type="submit">Luu chi tieu</button>
      </form>

      <div class="filters">
        <input id="filter-q" placeholder="Tim theo tieu de/ghi chu" />
        <input id="filter-category" placeholder="Loc theo category" />
        <input id="filter-from" type="date" />
        <input id="filter-to" type="date" />
        <button id="filter-btn">Loc</button>
      </div>

      <div class="stats">
        <h3>Thong ke</h3>
        <div class="stats-actions">
          <button data-group="day" class="stats-btn">Theo ngay</button>
          <button data-group="month" class="stats-btn">Theo thang</button>
        </div>
        <ul id="stats-list"></ul>
      </div>

      <table>
        <thead>
          <tr>
            <th>Tieu de</th>
            <th>Loai</th>
            <th>So tien</th>
            <th>Ngay</th>
            <th>Ghi chu</th>
            <th>Hanh dong</th>
          </tr>
        </thead>
        <tbody id="expense-table-body"></tbody>
      </table>
    </section>

    <div id="message"></div>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
