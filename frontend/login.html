<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoneyTracker - Dang nhap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <main class="container">
    <header class="hero">
      <h1>MoneyTracker</h1>
      <p>Quan ly chi tieu ca nhan voi thong ke va tim kiem nhanh.</p>
    </header>

    <section class="card auth-page">
      <div>
        <h2>Dang nhap</h2>
        <p class="auth-subtitle">Dang nhap vao tai khoan cua ban</p>
        <form id="login-form">
          <input name="username" placeholder="Username" required autofocus />
          <input name="password" placeholder="Password" type="password" required />
          <button type="submit">Dang nhap</button>
        </form>
        <p class="auth-footer">Chua co tai khoan? <a href="register.html" id="link-to-register">Dang ky</a></p>
      </div>
    </section>

    <div id="message"></div>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
