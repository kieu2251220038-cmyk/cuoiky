services:
  - type: web
    name: moneytracker-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: moneytracker-backend.onrender.com
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://moneytracker-frontend.onrender.com
      - key: LOG_LEVEL
        value: INFO

  - type: web
    name: moneytracker-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    envVars:
      - key: API_BASE_URL
        value: https://moneytracker-backend.onrender.com/api
