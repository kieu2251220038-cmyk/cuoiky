name: CI

on:
  push:
    branches: ["main", "dev", "feature/**"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: moneytracker
          POSTGRES_USER: moneytracker
          POSTGRES_PASSWORD: moneytracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U moneytracker -d moneytracker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      SECRET_KEY: ci-secret
      DEBUG: False
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: moneytracker
      DB_USER: moneytracker
      DB_PASSWORD: moneytracker
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      CORS_ALLOWED_ORIGINS: http://localhost:8080

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: flake8 .

      - name: Test
        run: python manage.py test

  build-images:
    runs-on: ubuntu-latest
    needs: backend-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

  frontend-build:
    runs-on: ubuntu-latest
    name: Frontend build
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Docker images
        run: docker compose build
