name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  render-deploy:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip deploy when Render secrets are missing
        if: env.RENDER_API_KEY == '' || env.RENDER_SERVICE_ID == ''
        run: echo "Render secrets are not configured; skipping deploy."

      - name: Trigger Render deploy
        if: env.RENDER_API_KEY != '' && env.RENDER_SERVICE_ID != ''
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
              -d '{"serviceId":"'${RENDER_SERVICE_ID}'"}' https://api.render.com/deploy
